services:
  postgres:
    image: postgres:16-alpine
    container_name: lastmile-db
    environment:
      POSTGRES_DB: lastmile
      POSTGRES_USER: lastmile
      POSTGRES_PASSWORD: lastmile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastmile"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lastmile-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lastmile.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lastmile-api
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: lastmile
      DB_USERNAME: lastmile
      DB_PASSWORD: lastmile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
      - ./experiments:/var/www/html/experiments
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lastmile-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-next:/app/.next
    depends_on:
      - backend

  osrm-prepare:
    build:
      context: ./backend/docker/osrm
      dockerfile: Dockerfile.prepare
    container_name: lastmile-osrm-prepare
    profiles:
      - tools
    volumes:
      - osrm-data:/data

  osrm:
    build:
      context: ./backend/docker/osrm
      dockerfile: Dockerfile
    container_name: lastmile-osrm
    ports:
      - "5001:5000"
    volumes:
      - osrm-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/route/v1/driving/-71.62,-33.045;-71.61,-33.05?overview=false"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  osrm-data:
  frontend-next:
